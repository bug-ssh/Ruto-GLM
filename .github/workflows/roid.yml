name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      - name: Setup signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          if [ -n "$SIGNING_KEYSTORE" ]; then
            echo "$SIGNING_KEYSTORE" | base64 --decode > keystore/release.jks
            printf "storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "$SIGNING_STORE_PASSWORD" "$SIGNING_KEY_ALIAS" "$SIGNING_KEY_PASSWORD" \
              > keystore/r0s.properties
          else
            keytool -genkeypair -v \
              -keystore keystore/release.jks \
              -alias release \
              -keyalg RSA -keysize 2048 \
              -validity 3650 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=Ruto, O=Ruto, C=CN"
            printf "storeFile=release.jks\nstorePassword=android123\nkeyAlias=release\nkeyPassword=android123\n" \
              > keystore/r0s.properties
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          VERSION=$(grep 'versionName' app/build.grade.kts | head -1 | sed -n 's/.*"\(.*\)".*/\1/p')
          TAG="${{ github.ref_name }}"
          LABEL="${TAG:-v${VERSION:-unknown}}"
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "Error: APK not found"
            exit 1
          fi
          cp "$APK_FILE" "dist/Ruto-${LABEL}-release.apk"
          echo "APK_PATH=dist/Ruto-${LABEL}-release.apk" >> $GITHUB_ENV
          echo "APK_NAME=Ruto-${LABEL}-release" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          name: "Ruto ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
