name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # 推送 tag（如 v1.0.1）时自动构建并发布到 GitHub Releases
  workflow_dispatch:    # 允许在 GitHub 网页上手动触发

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 设置 JDK 21 ────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. 缓存 Gradle 依赖 ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. 赋予 gradlew 执行权限 ───────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. 修复 app/build.gradle.kts（项目中文件名有 typo）─────────
      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      # ── 6. 构建 Debug APK（无需 keystore，自动签名）──────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 7. 上传为 Artifact（每次构建都可在 Actions 页面下载）───────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruto-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 8. 推送 tag 时，自动发布到 GitHub Releases ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          name: "Ruto ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
