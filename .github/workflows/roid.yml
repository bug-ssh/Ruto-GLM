name: Build & Release APK

"on":
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. 设置 JDK 21 ────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. 安装 Android SDK 36 ────────────────────────────────────
      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ── 4. 缓存 Gradle 依赖 ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. 赋予 gradlew 执行权限 ───────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. 修复 app/build.gradle.kts（原文件名有拼写错误）────────────
      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      # ── 7. 配置签名 Keystore ──────────────────────────────────────
      #    有 SIGNING_KEYSTORE Secret → 使用正式签名
      #    无 Secret → 自动生成临时 keystore（可直接安装，但每次签名不同）
      - name: Setup signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          if [ -n "${SIGNING_KEYSTORE}" ]; then
            echo "使用仓库 Secret 中的正式签名 keystore"
            echo "${SIGNING_KEYSTORE}" | base64 --decode > keystore/release.jks
            printf "storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "${SIGNING_STORE_PASSWORD}" "${SIGNING_KEY_ALIAS}" "${SIGNING_KEY_PASSWORD}" \
              > keystore/r0s.properties
          else
            echo "未配置 Secrets，自动生成临时 keystore"
            keytool -genkeypair -v \
              -keystore keystore/release.jks \
              -alias release \
              -keyalg RSA -keysize 2048 \
              -validity 3650 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=Ruto, O=Ruto, C=CN"
            printf "storeFile=release.jks\nstorePassword=android123\nkeyAlias=release\nkeyPassword=android123\n" \
              > keystore/r0s.properties
          fi

      # ── 8. 构建 Release APK ───────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── 9. 重命名 APK ─────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p dist
          VERSION=$(grep 'versionName' app/build.grade.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${{ github.ref_name }}"
          LABEL="${TAG:-v${VERSION}}"
          cp app/build/outputs/apk/release/*.apk "dist/Ruto-${LABEL}-release.apk"
          echo "APK_PATH=dist/Ruto-${LABEL}-release.apk" >> $GITHUB_ENV
          echo "APK_NAME=Ruto-${LABEL}-release" >> $GITHUB_ENV

      # ── 10. 上传为 Artifact（每次构建均保留 30 天）───────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 11. 推送 tag 时，自动发布到 GitHub Releases ───────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          name: "Ruto ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
