# =============================================================================
# Release 工作流 —— 推送 v* 标签时自动构建 Release APK 并发布到 GitHub Releases
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'          # 例：v1.01, v2.0.0-beta
  workflow_dispatch:   # 支持手动触发

# 同一 tag 只允许一个 Release 流程
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  # ─────────────────── 1. 构建矩阵：Debug + Release ────────────────────────
  build:
    name: Build ${{ matrix.build-type }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 修复已知文件名拼写错误
      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      # ── 签名配置 ──────────────────────────────────────────────────────
      - name: Setup signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          if [ "${{ matrix.build-type }}" = "Release" ] && [ -n "$SIGNING_KEYSTORE" ]; then
            # 使用仓库配置的正式签名密钥
            echo "$SIGNING_KEYSTORE" | base64 --decode > keystore/r0s.jks
            printf "storeFile=r0s.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "$SIGNING_STORE_PASSWORD" "$SIGNING_KEY_ALIAS" "$SIGNING_KEY_PASSWORD" \
              > keystore/r0s.properties
          elif [ "${{ matrix.build-type }}" = "Release" ]; then
            # 未配置密钥时生成临时 Release 签名（仅用于 CI 验证）
            echo "⚠️ No SIGNING_KEYSTORE found, using temporary keystore for Release build"
            keytool -genkeypair -v \
              -keystore keystore/r0s.jks \
              -alias release \
              -keyalg RSA -keysize 2048 \
              -validity 3650 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=Ruto, O=Ruto, C=CN"
            printf "storeFile=r0s.jks\nstorePassword=android123\nkeyAlias=release\nkeyPassword=android123\n" \
              > keystore/r0s.properties
          else
            # Debug 构建使用临时密钥
            keytool -genkeypair -v \
              -keystore keystore/debug.jks \
              -alias debug \
              -keyalg RSA -keysize 2048 \
              -validity 365 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=Debug, O=Debug, C=US"
            cat > keystore/debug.properties <<PROPS
            storeFile=debug.jks
            storePassword=android123
            keyAlias=debug
            keyPassword=android123
            PROPS
          fi

      # ── 构建 APK ──────────────────────────────────────────────────────
      - name: Build ${{ matrix.build-type }} APK
        run: ./gradlew assemble${{ matrix.build-type }} --stacktrace

      # ── 重命名并准备产物 ─────────────────────────────────────────────
      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          # 从 build.grade.kts 提取版本号
          VERSION=$(grep 'versionName' app/build.grade.kts | head -1 | sed -n 's/.*"\(.*\)".*/\1/p')
          TAG="${{ github.ref_name }}"
          LABEL="${TAG:-v${VERSION:-snapshot}}"
          TYPE="${{ matrix.build-type }}"

          APK_FILE=$(find app/build/outputs/apk/${TYPE,,} -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ APK not found in app/build/outputs/apk/${TYPE,,}/"
            exit 1
          fi

          TARGET_NAME="Ruto-${LABEL}-${TYPE,,}.apk"
          cp "$APK_FILE" "dist/${TARGET_NAME}"

          # 输出到 GITHUB_ENV 供后续步骤使用
          echo "APK_PATH=dist/${TARGET_NAME}" >> $GITHUB_ENV
          echo "APK_NAME=Ruto-${LABEL}-${TYPE,,}" >> $GITHUB_ENV
          echo "✅ Built: ${TARGET_NAME} ($(du -h "$APK_FILE" | cut -f1))"

      # ── 上传到 Actions Artifacts ──────────────────────────────────────
      - name: Upload ${{ matrix.build-type }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

  # ─────────────────── 2. 发布到 GitHub Releases ─────────────────────────
  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 下载所有构建产物（Debug + Release）
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -name "*.apk" -exec ls -lh {} \;

      # 创建 GitHub Release 并附带所有 APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ruto ${{ github.ref_name }}"
          body: |
            ## 📦 Ruto ${{ github.ref_name }}

            ### 下载
            | 文件 | 说明 |
            |------|------|
            | `*-release.apk` | 🚀 生产版本（推荐） |
            | `*-debug.apk` | 🐛 调试版本（用于问题排查） |

            > 基于 commit: ${{ github.sha }}

            ### 安装说明
            1. 需要已安装 [Shizuku](https://github.com/RikkaApps/Shizuku) 并授权
            2. 最低支持 Android 8.0 (API 26)
          generate_release_notes: true
          files: dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
