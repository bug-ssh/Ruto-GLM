# =============================================================================
# CI 工作流 —— 每次推送/PR 自动执行 Lint + Unit Test + Build
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 同一分支/PR 的多次推送取消之前还在跑的 CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  # ─────────────────────────── 1. 代码检查 (Lint) ───────────────────────────
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 修复已知文件名拼写错误
      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      # 生成临时 debug keystore（Lint 需要签名信息）
      - name: Generate temporary debug keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/debug.jks \
            -alias debug \
            -keyalg RSA -keysize 2048 \
            -validity 365 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Debug, O=Debug, C=US"
          cat > keystore/debug.properties <<PROPS
          storeFile=debug.jks
          storePassword=android123
          keyAlias=debug
          keyPassword=android123
          PROPS

      - name: Run Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # ─────────────────────────── 2. 单元测试 ──────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # 与 lint 并行运行（无 needs 依赖）
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      - name: Generate temporary debug keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/debug.jks \
            -alias debug \
            -keyalg RSA -keysize 2048 \
            -validity 365 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Debug, O=Debug, C=US"
          cat > keystore/debug.properties <<PROPS
          storeFile=debug.jks
          storePassword=android123
          keyAlias=debug
          keyPassword=android123
          PROPS

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          retention-days: 14

  # ─────────────────────────── 3. 构建验证 ──────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]  # Lint 和 Test 全部通过后才构建
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix app/build.gradle.kts
        run: cp app/build.grade.kts app/build.gradle.kts

      - name: Generate temporary debug keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/debug.jks \
            -alias debug \
            -keyalg RSA -keysize 2048 \
            -validity 365 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Debug, O=Debug, C=US"
          cat > keystore/debug.properties <<PROPS
          storeFile=debug.jks
          storePassword=android123
          keyAlias=debug
          keyPassword=android123
          PROPS

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ruto-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
